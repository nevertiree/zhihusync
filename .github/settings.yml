# GitHub 仓库设置
# 需要安装 GitHub Settings App: https://github.com/apps/settings

repository:
  # 基本设置
  name: zhihusync
  description: 知乎点赞内容自动备份工具 - 防止珍贵回答丢失
  private: false

  # 功能开关
  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: false

  # 默认分支
  default_branch: master

  # 允许合并方式
  allow_squash_merge: true
  allow_merge_commit: true
  allow_rebase_merge: false
  delete_branch_on_merge: true

# 分支保护规则
branches:
  - name: master
    protection:
      # 需要 PR 才能合并
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false

      # 禁止直接推送（空用户列表表示禁止所有人直接推送）
      restrictions:
        users: []
        teams: []

      # 禁止强制推送和删除
      allow_force_pushes: false
      allow_deletions: false

      # 需要状态检查通过
      required_status_checks:
        strict: true
        contexts:
          - "lint"
          - "unit-tests"

      # 要求分支最新
      require_linear_history: false
      require_signature: false

  - name: develop
    protection:
      # 需要 PR 才能合并
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true

      # 禁止直接推送
      restrictions:
        users: []
        teams: []

      # 禁止强制推送和删除
      allow_force_pushes: false
      allow_deletions: false

      # 需要状态检查通过
      required_status_checks:
        strict: true
        contexts:
          - "lint"
          - "unit-tests"
