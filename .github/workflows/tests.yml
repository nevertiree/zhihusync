name: Tests

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  # ========== 集成测试 ==========
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test directories
        run: |
          mkdir -p data/meta data/html data/static data/logs

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short -m integration

  # ========== E2E 测试（带浏览器） ==========
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test directories
        run: |
          mkdir -p data/meta data/html data/static data/logs config
          echo '{"zhihu": {"user_id": ""}, "storage": {"db_path": "data/meta/test.db"}}' > config/config.yaml

      - name: Start test server
        run: |
          cd src && python -c "
          import threading
          import time
          from app import app
          import uvicorn

          def run_server():
              uvicorn.run(app, host='127.0.0.1', port=6067, log_level='error')

          server_thread = threading.Thread(target=run_server, daemon=True)
          server_thread.start()
          time.sleep(3)
          print('Server started')
          while True:
              time.sleep(1)
          " &
          sleep 5

      - name: Run E2E tests
        run: |
          pytest tests/e2e/test_web_ui.py -v --tb=short -m e2e

      - name: Run extraction errors tests
        run: |
          pytest tests/e2e/test_extraction_errors.py -v --tb=short -m e2e || true

  # ========== 代码质量检查 ==========
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy

      - name: Run Ruff
        run: |
          ruff check src/ tests/

      - name: Run Black check
        run: |
          black --check src/ tests/

      - name: Run MyPy
        run: |
          mypy src/ --ignore-missing-imports
