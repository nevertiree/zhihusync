name: Tests

on:
  push:
    branches: [master, develop, fix/*, feature/*]
  pull_request:
    branches: [master, develop]

# 注意：集成测试和 E2E 测试需要在本地运行
# 本地运行命令：
#   make test-integration  # 运行集成测试
#   make test-e2e          # 运行 E2E 测试（需要浏览器）
# GitHub Actions 仅运行代码质量检查，以提高 CI 速度和稳定性

jobs:
  # ========== 单元测试 ==========
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test directories
        run: |
          mkdir -p data/meta data/html data/static data/logs

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short -m unit

  # ========== 代码质量检查 ==========
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy==1.19.1 types-PyYAML types-aiofiles

      - name: Run Ruff
        run: |
          ruff check src/ tests/

      - name: Run Black check
        run: |
          black --check --line-length=120 src/ tests/

      - name: Run MyPy
        run: |
          mypy src/ --ignore-missing-imports --warn-unused-ignores=no
