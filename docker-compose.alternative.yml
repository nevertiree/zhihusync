# 使用预构建 Playwright 镜像，避免网络问题
version: '3.8'

services:
  zhihusync:
    # 使用微软官方的 Playwright 镜像，已包含所有依赖
    image: mcr.microsoft.com/playwright/python:v1.40.0-jammy
    container_name: zhihusync
    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      - ./data/html:/app/data/html
      - ./data/meta:/app/data/meta
      - ./data/static:/app/data/static
      - ./config:/app/config:ro
      - ./src:/app/src:ro
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
      - ./entrypoint.sh:/app/entrypoint.sh:ro
      - ./requirements.txt:/app/requirements.txt:ro

    working_dir: /app

    command: >
      bash -c "
        pip install -r requirements.txt &&
        python -m src.app --mode both
      "

    environment:
      - ZHIHUSYNC_ZHIHU_USER_ID=${ZHIHU_USER_ID:-}
      - ZHIHUSYNC_ZHIHU_SCAN_INTERVAL=${SCAN_INTERVAL:-60}
      - ZHIHUSYNC_BROWSER_HEADLESS=${HEADLESS:-true}
      - PYTHONUNBUFFERED=1

    # 使用国内 PyPI 镜像
    extra_hosts:
      - "pypi.python.org:151.101.0.223"
      - "pypi.org:151.101.0.223"
