<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zhihusync Cookie Helper</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 320px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid #e0e0e0;
      }

      .header h1 {
        font-size: 16px;
        color: #333;
      }

      .header .icon {
        font-size: 24px;
      }

      .status {
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 12px;
        display: none;
      }

      .status.success {
        display: block;
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .status.error {
        display: block;
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .status.info {
        display: block;
        background: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
      }

      .form-group {
        margin-bottom: 12px;
      }

      .form-group label {
        display: block;
        font-size: 12px;
        color: #666;
        margin-bottom: 4px;
      }

      .form-group input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 13px;
      }

      .form-group input:focus {
        outline: none;
        border-color: #667eea;
      }

      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .btn-secondary {
        background: #fff;
        color: #333;
        border: 1px solid #ddd;
        margin-top: 8px;
      }

      .btn-secondary:hover {
        background: #f5f5f5;
      }

      .cookie-preview {
        margin-top: 12px;
        padding: 10px;
        background: #f8f9fa;
        border-radius: 6px;
        font-size: 12px;
        max-height: 100px;
        overflow-y: auto;
        word-break: break-all;
        display: none;
      }

      .cookie-preview.show {
        display: block;
      }

      .footer {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid #e0e0e0;
        font-size: 11px;
        color: #999;
        text-align: center;
      }

      .cookie-count {
        display: inline-block;
        background: #667eea;
        color: white;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 11px;
        margin-left: 8px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span class="icon">🚀</span>
      <h1>zhihusync 助手</h1>
    </div>

    <div id="status" class="status"></div>

    <div class="form-group">
      <label>服务器地址</label>
      <input type="text" id="server-url" placeholder="http://localhost:6067" value="http://localhost:6067" />
    </div>

    <button id="get-cookie-btn" class="btn btn-primary">🍪 获取知乎 Cookie</button>

    <button id="copy-cookie-btn" class="btn btn-secondary" style="display: none">📋 复制到剪贴板</button>

    <div id="cookie-preview" class="cookie-preview"></div>

    <div class="footer">一键获取并同步知乎 Cookie</div>

    <script src="popup.js"></script>
  </body>
</html>
