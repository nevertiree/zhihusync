# Docker Hub 部署配置 - 直接使用预构建镜像
# 无需本地构建，下载即用

version: "3.8"

services:
  zhihusync:
    image: nevertiree26/zhihusync:latest
    container_name: zhihusync
    restart: unless-stopped

    ports:
      # Web 管理界面
      - "6067:6067"

    volumes:
      # 数据持久化
      - ./data/html:/app/data/html
      - ./data/meta:/app/data/meta
      - ./data/images:/app/data/images
      - ./data/static:/app/data/static
      # 配置文件
      - ./config:/app/config

    environment:
      # 浏览器类型: auto(自动检测), chromium, firefox
      - PLAYWRIGHT_BROWSER=${PLAYWRIGHT_BROWSER:-auto}
      # 知乎配置（推荐在 Web 界面配置）
      - ZHIHUSYNC_ZHIHU_USER_ID=${ZHIHU_USER_ID:-}
      - ZHIHUSYNC_ZHIHU_SCAN_INTERVAL=${SCAN_INTERVAL:-60}
      - ZHIHUSYNC_BROWSER_HEADLESS=${HEADLESS:-true}
      - ZHIHUSYNC_LOGGING_LEVEL=${LOG_LEVEL:-INFO}
      # 禁用运行时浏览器下载
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # 可选: Nginx 用于直接浏览 HTML 备份文件
  nginx:
    image: nginx:alpine
    container_name: zhihusync-web
    restart: unless-stopped
    ports:
      - "6068:80"
    volumes:
      - ./data/html:/usr/share/nginx/html/answers:ro
      - ./data/images:/usr/share/nginx/html/images:ro
      - ./data/static:/usr/share/nginx/html/static:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - zhihusync
    profiles:
      - nginx
