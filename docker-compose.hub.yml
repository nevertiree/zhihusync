# Docker Hub 预构建镜像部署配置
# 无需本地构建，直接拉取使用（适合网络不稳定环境）
#
# 使用方法：
#   docker-compose -f docker-compose.hub.yml up -d
#
# 如需 Nginx 静态文件服务：
#   docker-compose -f docker-compose.hub.yml --profile nginx up -d

version: "3.8"

services:
  zhihusync:
    image: nevertiree26/zhihusync:latest
    container_name: zhihusync
    restart: unless-stopped

    ports:
      - "6067:6067"

    volumes:
      - ./data/html:/app/data/html
      - ./data/meta:/app/data/meta
      - ./data/images:/app/data/images
      - ./data/static:/app/data/static
      - ./config:/app/config

    environment:
      - PLAYWRIGHT_BROWSER=${PLAYWRIGHT_BROWSER:-chromium}
      - ZHIHUSYNC_ZHIHU_USER_ID=${ZHIHU_USER_ID:-}
      - ZHIHUSYNC_ZHIHU_SCAN_INTERVAL=${SCAN_INTERVAL:-60}
      - ZHIHUSYNC_BROWSER_HEADLESS=${HEADLESS:-true}
      - ZHIHUSYNC_LOGGING_LEVEL=${LOG_LEVEL:-INFO}
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: zhihusync-web
    restart: unless-stopped
    ports:
      - "6068:80"
    volumes:
      - ./data/html:/usr/share/nginx/html/answers:ro
      - ./data/images:/usr/share/nginx/html/images:ro
      - ./data/static:/usr/share/nginx/html/static:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - zhihusync
    profiles: ["nginx"]
