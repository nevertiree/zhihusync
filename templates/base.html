<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}zhihusync{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/admin.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>📦 zhihusync</h1>
                <p>知乎备份工具</p>
            </div>

            <nav class="sidebar-nav">
                <a href="/" class="nav-item {% if request.url.path == '/' %}active{% endif %}">
                    <span class="icon">📊</span>
                    <span>仪表盘</span>
                </a>
                <a href="/content" class="nav-item {% if request.url.path == '/content' %}active{% endif %}">
                    <span class="icon">📄</span>
                    <span>备份内容</span>
                </a>
                <a href="/config" class="nav-item {% if request.url.path == '/config' %}active{% endif %}">
                    <span class="icon">⚙️</span>
                    <span>配置</span>
                </a>
                <a href="/logs" class="nav-item {% if request.url.path == '/logs' %}active{% endif %}">
                    <span class="icon">📋</span>
                    <span>日志</span>
                </a>
                <a href="/donate" class="nav-item {% if request.url.path == '/donate' %}active{% endif %}">
                    <span class="icon">☕</span>
                    <span>捐赠</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="sync-status" id="sidebar-status">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-text">检查中...</span>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Toast 通知容器 -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/static/js/admin.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
