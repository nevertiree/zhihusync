{% extends "base.html" %}

{% block title %}明细 - zhihusync{% endblock %}

{% block content %}
<div class="page-header">
    <h2>📋 明细</h2>
    <div class="header-actions">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="搜索标题或作者..."
                onkeyup="if(event.key==='Enter')loadAnswers()">
            <button class="btn btn-icon" onclick="loadAnswers()">🔍</button>
        </div>
    </div>
</div>

<!-- 内容列表 -->
<div class="card">
    <div class="card-body">
        <div class="table-container">
            <table class="data-table detail-table">
                <thead>
                    <tr>
                        <th style="width: 80px;">用户</th>
                        <th style="width: 120px;">回答作者</th>
                        <th style="min-width: 200px;">问题标题</th>
                        <th style="width: 60px;">点赞</th>
                        <th style="width: 60px;">评论</th>
                        <th style="width: 90px;">点赞时间</th>
                        <th style="width: 90px;">回答时间</th>
                        <th style="width: 90px;">修改时间</th>
                        <th style="width: 90px;">备份时间</th>
                        <th style="width: 140px;">操作</th>
                    </tr>
                </thead>
                <tbody id="answers-body">
                    <tr>
                        <td colspan="10" class="text-center text-muted">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 分页 -->
        <div class="pagination" id="pagination">
            <!-- 动态生成分页 -->
        </div>
    </div>
</div>

<!-- 生成长图模态框 -->
<div class="modal" id="image-modal">
    <div class="modal-overlay" onclick="closeImageModal()"></div>
    <div class="modal-content modal-lg">
        <div class="modal-header">
            <h3>📷 生成长图</h3>
            <button class="btn btn-icon" onclick="closeImageModal()">✕</button>
        </div>
        <div class="modal-body">
            <div id="image-generate-form">
                <p class="text-muted" id="image-modal-title">正在准备生成...</p>
                <div class="form-group">
                    <label>卡片样式</label>
                    <select id="card-style" class="form-control">
                        <option value="default">默认样式 (完整)</option>
                        <option value="compact">紧凑样式 (适合手机)</option>
                        <option value="minimal">极简样式 (仅内容)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="include-comments"> 包含评论区
                    </label>
                </div>
            </div>
            <div id="image-generating" class="text-center hidden">
                <div class="loading-spinner"></div>
                <p class="text-muted mt-3">正在生成图片，请稍候...</p>
                <p class="text-muted small">首次生成可能需要下载浏览器组件</p>
            </div>
            <div id="image-result" class="hidden">
                <div class="image-preview-container">
                    <img id="generated-image" src="" alt="生成的长图" class="image-preview">
                </div>
                <div class="image-actions">
                    <a id="image-download-link" href="" download class="btn btn-primary">下载图片</a>
                    <button class="btn btn-secondary" onclick="copyImageUrl()">复制链接</button>
                </div>
            </div>
            <div id="image-error" class="alert alert-danger hidden">
                <p id="image-error-message"></p>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeImageModal()">取消</button>
            <button class="btn btn-primary" id="btn-generate" onclick="generateImage()">开始生成</button>
            <a id="btn-download" href="" download class="btn btn-success hidden">下载图片</a>
        </div>
    </div>
</div>
{% endblock %}

{% block styles %}
<style>
/* 明细表格样式 */
.detail-table {
    font-size: 12px;
}

.detail-table th {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    padding: 10px 6px;
    white-space: nowrap;
}

.detail-table td {
    padding: 8px 6px;
    vertical-align: middle;
}

/* 用户标签 */
.user-tag {
    display: inline-block;
    padding: 2px 8px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
}

/* 作者信息 */
.author-cell {
    display: flex;
    align-items: center;
    gap: 6px;
}

/* 作者头像 - 使用 !important 防止被覆盖 */
.author-avatar-small {
    width: 20px !important;
    height: 20px !important;
    border-radius: 50% !important;
    object-fit: cover !important;
    flex-shrink: 0 !important;
    display: inline-block !important;
    max-width: 20px !important;
    max-height: 20px !important;
}

.author-avatar-placeholder {
    width: 20px !important;
    height: 20px !important;
    border-radius: 50% !important;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex !important;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    flex-shrink: 0 !important;
}

.author-name {
    font-weight: 500;
    color: var(--text-primary);
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* 问题标题 */
.title-cell {
    max-width: 250px;
}

.title-cell a {
    color: var(--text-primary);
    text-decoration: none;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.title-cell a:hover {
    color: var(--primary);
}

/* 数字列 */
.number-cell {
    text-align: center;
    font-variant-numeric: tabular-nums;
}

/* 时间列 */
.time-cell {
    font-size: 11px;
    color: var(--text-secondary);
    white-space: nowrap;
}

/* 操作按钮 */
.actions-cell {
    display: flex;
    gap: 4px;
    flex-wrap: nowrap;
}

.actions-cell .btn {
    padding: 4px 8px;
    font-size: 11px;
    white-space: nowrap;
}

.btn-view {
    background: var(--primary);
    color: white;
}

.btn-view:hover {
    background: var(--primary-dark);
}

.btn-screenshot {
    background: var(--success);
    color: white;
}

.btn-screenshot:hover {
    background: #45ad14;
}

.btn-delete {
    background: var(--danger);
    color: white;
}

.btn-delete:hover {
    background: #cf1322;
}

/* 响应式 */
@media (max-width: 1400px) {
    .detail-table {
        font-size: 11px;
    }
    
    .detail-table th,
    .detail-table td {
        padding: 6px 4px;
    }
}
</style>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;
let totalPages = 1;
let currentAnswerId = null;
let currentAnswerTitle = '';

// 格式化时间
function formatTime(isoString) {
    if (!isoString) return '-';
    const date = new Date(isoString);
    return date.toLocaleString('zh-CN', {
        timeZone: 'Asia/Shanghai',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
    });
}

// 格式化日期
function formatDate(isoString) {
    if (!isoString) return '-';
    const date = new Date(isoString);
    return date.toLocaleString('zh-CN', {
        timeZone: 'Asia/Shanghai',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
    });
}

// 加载回答列表
async function loadAnswers(page = 1) {
    currentPage = page;
    const search = document.getElementById('search-input').value.trim();

    try {
        const tbody = document.getElementById('answers-body');
        tbody.innerHTML = '<tr><td colspan="10" class="text-center">加载中...</td></tr>';

        const url = `/api/answers?page=${page}&page_size=20${search ? '&search=' + encodeURIComponent(search) : ''}`;
        const res = await fetch(url);
        const data = await res.json();

        totalPages = data.total_pages;

        if (data.items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted">暂无数据</td></tr>';
            renderPagination();
            return;
        }

        tbody.innerHTML = data.items.map(item => {
            const title = escapeHtml(item.question_title || '无标题');
            const author = escapeHtml(item.author_name || '匿名用户');
            const userTag = escapeHtml(item.user_id ? item.user_id.substring(0, 6) : '未知');
            
            const authorAvatar = item.author_avatar_url
                ? `<img src="${item.author_avatar_url}" class="author-avatar-small" alt="">`
                : '<span class="author-avatar-placeholder">👤</span>';
            
            const htmlFileName = item.html_path ? item.html_path.split('/').pop() : '';

            return `
                <tr>
                    <td><span class="user-tag" title="用户ID: ${escapeHtml(item.user_id || '')}">${userTag}</span></td>
                    <td>
                        <div class="author-cell" title="${author}">
                            ${authorAvatar}
                            <span class="author-name">${author}</span>
                        </div>
                    </td>
                    <td class="title-cell" title="${title}">
                        <a href="${item.original_url}" target="_blank">${title}</a>
                    </td>
                    <td class="number-cell">${item.voteup_count.toLocaleString()}</td>
                    <td class="number-cell">${item.comment_count.toLocaleString()}</td>
                    <td class="time-cell">${formatTime(item.liked_time)}</td>
                    <td class="time-cell">${formatDate(item.created_time)}</td>
                    <td class="time-cell">${formatDate(item.updated_time)}</td>
                    <td class="time-cell">${formatTime(item.synced_at)}</td>
                    <td class="actions-cell">
                        ${item.html_path ? `
                            <a href="/data/html/${encodeURIComponent(htmlFileName)}"
                               target="_blank" class="btn btn-view" title="查看">👁</a>
                            <button class="btn btn-screenshot"
                                    onclick="openImageModal('${item.id}', '${escapeHtml(title)}')"
                                    title="截图">📷</button>
                        ` : '<span class="text-muted">-</span>'}
                        <button class="btn btn-delete" onclick="deleteAnswer('${item.id}', '${escapeHtml(title)}')" title="删除">🗑</button>
                    </td>
                </tr>
            `;
        }).join('');

        renderPagination();
    } catch (e) {
        console.error('加载失败:', e);
        document.getElementById('answers-body').innerHTML =
            `<tr><td colspan="10" class="text-center text-danger">加载失败: ${e.message}</td></tr>`;
    }
}

// 渲染分页
function renderPagination() {
    const container = document.getElementById('pagination');

    if (totalPages <= 1) {
        container.innerHTML = '';
        return;
    }

    let html = '';

    html += `<button class="btn btn-sm ${currentPage === 1 ? 'disabled' : ''}"
        ${currentPage === 1 ? '' : `onclick="loadAnswers(${currentPage - 1})"`}>上一页</button>`;

    const maxButtons = 5;
    let start = Math.max(1, currentPage - Math.floor(maxButtons / 2));
    let end = Math.min(totalPages, start + maxButtons - 1);

    if (end - start < maxButtons - 1) {
        start = Math.max(1, end - maxButtons + 1);
    }

    if (start > 1) {
        html += `<button class="btn btn-sm" onclick="loadAnswers(1)">1</button>`;
        if (start > 2) html += `<span class="pagination-ellipsis">...</span>`;
    }

    for (let i = start; i <= end; i++) {
        html += `<button class="btn btn-sm ${i === currentPage ? 'active' : ''}"
            onclick="loadAnswers(${i})">${i}</button>`;
    }

    if (end < totalPages) {
        if (end < totalPages - 1) html += `<span class="pagination-ellipsis">...</span>`;
        html += `<button class="btn btn-sm" onclick="loadAnswers(${totalPages})">${totalPages}</button>`;
    }

    html += `<button class="btn btn-sm ${currentPage === totalPages ? 'disabled' : ''}"
        ${currentPage === totalPages ? '' : `onclick="loadAnswers(${currentPage + 1})"`}>下一页</button>`;

    container.innerHTML = html;
}

// 删除回答
async function deleteAnswer(answerId, title) {
    if (!confirm(`确定要删除回答 "${title.substring(0, 30)}..." 吗？\n\n此操作不可恢复！`)) {
        return;
    }

    try {
        const res = await fetch(`/api/answers/${answerId}`, { method: 'DELETE' });
        if (res.ok) {
            showToast('删除成功', 'success');
            loadAnswers(currentPage);
        } else {
            const data = await res.json();
            showToast(data.detail || '删除失败', 'error');
        }
    } catch (e) {
        showToast('删除失败: ' + e.message, 'error');
    }
}

// 打开生成长图模态框
function openImageModal(answerId, title) {
    currentAnswerId = answerId;
    currentAnswerTitle = title;

    document.getElementById('image-modal-title').textContent = `为回答生成长图: ${title.substring(0, 50)}${title.length > 50 ? '...' : ''}`;
    document.getElementById('image-generate-form').classList.remove('hidden');
    document.getElementById('image-generating').classList.add('hidden');
    document.getElementById('image-result').classList.add('hidden');
    document.getElementById('image-error').classList.add('hidden');
    document.getElementById('btn-generate').classList.remove('hidden');
    document.getElementById('btn-download').classList.add('hidden');

    document.getElementById('image-modal').classList.add('active');
}

// 关闭生成长图模态框
function closeImageModal() {
    document.getElementById('image-modal').classList.remove('active');
}

// 生成长图
async function generateImage() {
    const cardStyle = document.getElementById('card-style').value;
    const includeComments = document.getElementById('include-comments').checked;

    document.getElementById('image-generate-form').classList.add('hidden');
    document.getElementById('image-generating').classList.remove('hidden');
    document.getElementById('btn-generate').classList.add('hidden');

    try {
        const url = `/api/answers/${currentAnswerId}/generate-image?card_style=${cardStyle}&include_comments=${includeComments}`;
        const res = await fetch(url, { method: 'POST' });
        const data = await res.json();

        if (res.ok && data.status === 'success') {
            document.getElementById('image-generating').classList.add('hidden');
            document.getElementById('image-result').classList.remove('hidden');
            document.getElementById('generated-image').src = data.image_url;
            document.getElementById('image-download-link').href = data.image_url;
            document.getElementById('btn-download').href = data.image_url;
            document.getElementById('btn-download').classList.remove('hidden');
        } else {
            throw new Error(data.detail || '生成失败');
        }
    } catch (e) {
        document.getElementById('image-generating').classList.add('hidden');
        document.getElementById('image-error').classList.remove('hidden');
        document.getElementById('image-error-message').textContent = e.message;
        document.getElementById('btn-generate').classList.remove('hidden');
    }
}

// 复制图片链接
function copyImageUrl() {
    const url = document.getElementById('generated-image').src;
    navigator.clipboard.writeText(url).then(() => {
        showToast('链接已复制', 'success');
    });
}

// HTML 转义
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 初始化
document.addEventListener('DOMContentLoaded', function() {
    loadAnswers();
});
</script>
{% endblock %}
