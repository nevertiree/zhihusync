[flake8]
max-line-length = 100
extend-ignore = E203, W503
docstring-convention = google
select = D, DAR, E, F, W, I, Q
ignore = D100, D104, D415
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    data,
    logs,
    build,
    dist,
    *.egg-info

[docstring_coverage]
verbose = 1
fail_under = 90
skip_magic = True
skip_init = True
skip_file_doc = False
skip_private = True
skip_class_def = False

[isort]
profile = black
line_length = 100
skip = .venv, data, logs

[pydocstyle]
convention = google
match = .*\.py$
match_dir = ^(?!\.|venv|\.venv|data|logs).*
add-ignore = D100, D104, D415
