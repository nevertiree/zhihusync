repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(data/|logs/|test/|static/|templates/)
      - id: end-of-file-fixer
        exclude: ^(data/|logs/|test/|static/|templates/)
      - id: check-yaml
      - id: check-added-large-files
        args:
          - --maxkb=1000
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key

  # Ruff: 同时替代 flake8、black、isort
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      # 代码检查（替代 flake8）
      - id: ruff
        args:
          - --fix
          - --exit-non-zero-on-fix
        files: .*\.py$
      # 代码格式化（替代 black）
      - id: ruff-format
        files: .*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-PyYAML
          - types-requests
          - pydantic>=2.5.0
          - sqlalchemy>=2.0.0
          - types-beautifulsoup4
          - types-lxml
          - types-aiofiles
        args:
          - --ignore-missing-imports
          - --no-warn-unused-ignores
        files: .*\.py$
        exclude: .*_test\.py$

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or:
          - javascript
          - json
          - yaml
          - css
          - html
        exclude: ^(data/|logs/|test/|\.venv/|__pycache__/|static/js/admin\.js)
        additional_dependencies:
          - prettier@3.1.0
