# zhihusync Docker Compose 配置
# 支持多种部署方式
#
# 使用方法:
#   docker compose up -d                    # 使用 Docker Hub 预构建镜像
#   docker compose --profile local up -d    # 本地完整构建（离线可用）
#   docker compose --profile dev up -d      # 开发模式（挂载代码卷）

version: "3.8"

services:
  # ========== Docker Hub 预构建版（推荐，默认）==========
  zhihusync:
    image: nevertiree/zhihusync:latest
    container_name: zhihusync
    restart: unless-stopped
    ports:
      - "6067:6067"
    volumes:
      - ./data/html:/app/data/html
      - ./data/meta:/app/data/meta
      - ./data/images:/app/data/images
      - ./data/static:/app/data/static
      - ./config:/app/config
    environment:
      - PLAYWRIGHT_BROWSER=chromium
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      - ZHIHUSYNC_LOGGING_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6067/api/stats')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ========== 本地完整构建（离线可用）==========
  zhihusync-local:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: zhihusync
    restart: unless-stopped
    profiles: ["local"]
    ports:
      - "6067:6067"
    volumes:
      - ./data/html:/app/data/html
      - ./data/meta:/app/data/meta
      - ./data/images:/app/data/images
      - ./data/static:/app/data/static
      - ./config:/app/config
    environment:
      - PLAYWRIGHT_BROWSER=chromium
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      - ZHIHUSYNC_LOGGING_LEVEL=${LOG_LEVEL:-INFO}

  # ========== 开发模式（代码热重载）==========
  zhihusync-dev:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: zhihusync-dev
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "6067:6067"
    volumes:
      # 数据卷
      - ./data/html:/app/data/html
      - ./data/meta:/app/data/meta
      - ./data/images:/app/data/images
      - ./data/static:/app/data/static
      - ./config:/app/config
      # 代码热重载
      - ./src:/app/src:ro
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
    environment:
      - PLAYWRIGHT_BROWSER=chromium
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      - ZHIHUSYNC_LOGGING_LEVEL=DEBUG
      - PYTHONDONTWRITEBYTECODE=1
