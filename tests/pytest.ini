[tool:pytest]
testpaths = unit integration e2e
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
markers =
    unit: 单元测试（快速，无依赖）
    integration: 集成测试（需要运行中的服务）
    e2e: 端到端测试（需要浏览器）
    slow: 慢速测试（需要较长时间）
    api: API 接口测试
    sync: 同步功能测试
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
